<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yan Coin K线图</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
    }
    header {
      padding: 16px 24px 12px;
      border-bottom: 1px solid #21262d;
    }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p { color: #8b949e; font-size: 0.85rem; margin-top: 4px; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 12px;
      align-items: center;
    }
    .control label {
      font-size: 0.85rem;
      color: #8b949e;
      margin-right: 8px;
    }
    .control select {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .control select:hover { border-color: #58a6ff; }
    #status {
      padding: 40px 24px;
      color: #8b949e;
      text-align: center;
    }
    #status.error { color: #f85149; }
    #chart { width: 100%; height: calc(100vh - 130px); display: none; }
    #info-panel {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 42vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      font-size: 12px;
      line-height: 1.55;
      z-index: 100;
      box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.35);
    }
    #info-panel .hint { color: #8b949e; }
    #info-panel .date { font-weight: 600; font-size: 13px; margin-bottom: 6px; }
    #info-panel .row { color: #c9d1d9; word-break: break-all; }
    @media (max-width: 768px) {
      header { padding: 12px 14px 10px; }
      header h1 { font-size: 1.15rem; }
      header p { font-size: 0.78rem; }
      .controls { gap: 10px; margin-top: 10px; }
      .control { flex: 1 1 100%; }
      .control select { width: 100%; }
      #info-panel { display: block; }
      #chart {
        height: calc(100vh - 200px - 42vh);
        min-height: 220px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Yan Coin (HKD)</h1>
    <p id="subtitle">初始发行价 1.1 HKD</p>
    <div class="controls">
      <div class="control">
        <label for="source">来源</label>
        <select id="source">
          <option value="bitcoin">Bitcoin</option>
          <option value="tencent">腾讯 (0700)</option>
        </select>
      </div>
      <div class="control">
        <label for="method">增发方法</label>
        <select id="method">
          <option value="volume">成交量 (360天)</option>
          <option value="revenue">交易收入 (365天)</option>
        </select>
      </div>
    </div>
  </header>
  <div id="status">正在加载数据…</div>
  <div id="chart"></div>
  <div id="info-panel"><span class="hint">滑动图表查看数据</span></div>

  <script>
    const CSV_FILES = {
      bitcoin: {
        volume: "Yan_stock_btc.csv",
        revenue: "Yan_stock_btc_revenue.csv",
      },
      tencent: {
        volume: "Yan_stock_700.csv",
        revenue: "Yan_stock_700_revenue.csv",
      },
    };

    const SUBTITLES = {
      bitcoin: { volume: "Bitcoin 成交量驱动 · 360天成交量增发", revenue: "Bitcoin 成交量驱动 · 365天交易收入增发" },
      tencent: { volume: "腾讯 0700 成交量驱动 · 360天成交量增发", revenue: "腾讯 0700 成交量驱动 · 365天交易收入增发" },
    };

    let chart = null;
    let currentData = null;
    let cachedRows = null;
    let lastMobile = null;

    function isMobile() {
      return window.matchMedia("(max-width: 768px)").matches;
    }

    function buildTooltipContent(idx, dateLabel) {
      if (!currentData || idx == null || idx < 0) return null;
      const [o, c, l, h] = currentData.ohlc[idx];
      const lines = [
        { label: "开", value: o },
        { label: "收", value: c },
        { label: "高", value: h },
        { label: "低", value: l },
        { label: "涨跌幅", value: currentData.changes[idx] },
        { label: "成交量", value: `${formatCompact(currentData.volumes[idx])} 股` },
        { label: "总股本", value: `${formatCompact(currentData.totalShares[idx])} 股` },
        { label: "交易收入", value: `${currentData.revenues[idx].toLocaleString()} HKD` },
        { label: "总收入", value: `${currentData.totalRevenues[idx].toLocaleString()} HKD` },
      ];
      const issued = currentData.issued[idx];
      if (issued > 0) {
        lines.push({ label: "增发", value: `${issued.toLocaleString()} 股` });
      }
      return { date: dateLabel || currentData.dates[idx], lines };
    }

    function tooltipHtml(content) {
      if (!content) return "";
      const rows = content.lines.map(
        (item) => `<div class="row">${item.label}: ${item.value}</div>`
      ).join("");
      return `<div class="date">${content.date}</div>${rows}`;
    }

    function updateInfoPanel(idx, dateLabel) {
      const panel = document.getElementById("info-panel");
      if (!isMobile()) return;
      const content = buildTooltipContent(idx, dateLabel);
      panel.innerHTML = content
        ? tooltipHtml(content)
        : '<span class="hint">滑动图表查看数据</span>';
    }

    function parseCSVLine(line) {
      const fields = [];
      let cur = "", inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuotes = !inQuotes; }
        else if (ch === "," && !inQuotes) { fields.push(cur); cur = ""; }
        else { cur += ch; }
      }
      fields.push(cur);
      return fields;
    }

    function parseCSV(text) {
      const lines = text.replace(/^\uFEFF/, "").trim().split(/\r?\n/);
      const headers = parseCSVLine(lines[0]);
      return lines.slice(1).map((line) => {
        const vals = parseCSVLine(line);
        const row = {};
        headers.forEach((h, i) => { row[h] = vals[i]; });
        return row;
      });
    }

    function formatCompact(n) {
      const abs = Math.abs(n);
      if (abs >= 1e9) return (n / 1e9).toFixed(2).replace(/\.?0+$/, "") + "B";
      if (abs >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
      if (abs >= 1e3) return (n / 1e3).toFixed(1).replace(/\.0$/, "") + "K";
      return String(n);
    }

    function rowsToChartData(rows) {
      let cumulativeRevenue = 0;
      const totalRevenues = rows.map((r) => {
        cumulativeRevenue += parseFloat(r["交易收入"]);
        return cumulativeRevenue;
      });
      return {
        dates: rows.map((r) => r["日期"]),
        ohlc: rows.map((r) => [
          parseFloat(r["开盘"]),
          parseFloat(r["收盘"]),
          parseFloat(r["低"]),
          parseFloat(r["高"]),
        ]),
        volumes: rows.map((r) => parseInt(r["成交量"], 10)),
        changes: rows.map((r) => r["涨跌幅"]),
        totalShares: rows.map((r) => parseInt(r["总股本"], 10)),
        revenues: rows.map((r) => parseFloat(r["交易收入"])),
        totalRevenues,
        issued: rows.map((r) => parseInt(r["增发股数"] || "0", 10)),
      };
    }

    function renderChart(DATA) {
      const status = document.getElementById("status");
      const chartEl = document.getElementById("chart");
      status.style.display = "none";
      chartEl.style.display = "block";

      if (chart) chart.dispose();
      chart = echarts.init(chartEl, "dark");
      currentData = DATA;
      lastMobile = isMobile();

      const kUpColor = "#26a69a";
      const kDownColor = "#ef5350";
      const volUpColor = "#58a6ff";
      const volDownColor = "#388bfd";
      const mobile = isMobile();

      chart.setOption({
        animation: false,
        tooltip: {
          show: !mobile,
          trigger: "axis",
          confine: true,
          className: "yan-tooltip",
          extraCssText: "max-width:min(360px,92vw);white-space:normal;line-height:1.55;",
          axisPointer: { type: mobile ? "line" : "cross" },
          position(point, _params, _dom, _rect, size) {
            const [x, y] = point;
            const [vw, vh] = size.viewSize;
            const [tw, th] = size.contentSize;
            let left = x + 12;
            let top = y - th - 12;
            if (left + tw > vw - 8) left = vw - tw - 8;
            if (left < 8) left = 8;
            if (top < 8) top = y + 12;
            if (top + th > vh - 8) top = vh - th - 8;
            return [left, top];
          },
          formatter(params) {
            const k = params.find((p) => p.seriesName === "K线");
            if (!k || !currentData) return "";
            const content = buildTooltipContent(k.dataIndex, k.axisValue);
            return content ? tooltipHtml(content) : "";
          },
        },
        legend: {
          data: [
            { name: "K线", icon: "rect", itemStyle: { color: kUpColor, borderColor: kDownColor } },
            { name: "成交量", icon: "rect", itemStyle: { color: volUpColor } },
          ],
          top: 6,
          left: "center",
          itemGap: 20,
        },
        grid: [
          { left: mobile ? 48 : 64, right: mobile ? 12 : 20, top: 40, height: mobile ? "50%" : "52%" },
          { left: mobile ? 48 : 64, right: mobile ? 12 : 20, top: mobile ? "66%" : "68%", height: mobile ? "12%" : "10%" },
        ],
        xAxis: [
          { type: "category", data: DATA.dates, gridIndex: 0, axisLabel: { show: false }, axisTick: { show: false } },
          { type: "category", data: DATA.dates, gridIndex: 1, axisLabel: { fontSize: 11, color: "#8b949e" } },
        ],
        yAxis: [
          { scale: true, gridIndex: 0, splitLine: { lineStyle: { color: "#21262d" } }, axisLabel: { fontSize: 11 } },
          { scale: true, gridIndex: 1, splitLine: { show: false }, axisLabel: {
              fontSize: 11, formatter: (v) => formatCompact(v),
            } },
        ],
        dataZoom: [
          { type: "inside", xAxisIndex: [0, 1], start: mobile ? 90 : 80, end: 100 },
          { type: "slider", xAxisIndex: [0, 1], bottom: mobile ? 8 : 12, height: mobile ? 22 : 28 },
        ],
        series: [
          {
            name: "K线",
            type: "candlestick",
            data: DATA.ohlc,
            xAxisIndex: 0,
            yAxisIndex: 0,
            itemStyle: {
              color: kUpColor, color0: kDownColor,
              borderColor: kUpColor, borderColor0: kDownColor,
            },
            markLine: {
              silent: true,
              symbol: "none",
              label: { fontSize: 11, position: "insideStartTop" },
              data: [
                { yAxis: 1.1, lineStyle: { color: "#58a6ff", type: "dashed" }, label: { formatter: "发行价 1.1", color: "#58a6ff" } },
              ],
            },
          },
          {
            name: "成交量",
            type: "bar",
            data: DATA.volumes,
            xAxisIndex: 1,
            yAxisIndex: 1,
            itemStyle: {
              color(params) {
                const [o, c] = DATA.ohlc[params.dataIndex];
                return c >= o ? volUpColor : volDownColor;
              },
            },
          },
        ],
      });

      chart.on("updateAxisPointer", (e) => {
        if (!isMobile() || !currentData) return;
        const axisInfo = e.axesInfo?.find((a) => a.axisDim === "x");
        if (!axisInfo || axisInfo.value == null) return;
        const idx = currentData.dates.indexOf(axisInfo.value);
        if (idx >= 0) updateInfoPanel(idx, axisInfo.value);
      });

      if (mobile && currentData.dates.length) {
        const lastIdx = currentData.dates.length - 1;
        updateInfoPanel(lastIdx, currentData.dates[lastIdx]);
      }
    }

    async function loadChart() {
      const source = document.getElementById("source").value;
      const method = document.getElementById("method").value;
      const csvUrl = CSV_FILES[source][method];
      const status = document.getElementById("status");
      const chartEl = document.getElementById("chart");

      document.getElementById("subtitle").textContent =
        `初始发行价 1.1 HKD · ${SUBTITLES[source][method]}`;

      status.className = "";
      status.style.display = "block";
      status.textContent = `正在加载 ${csvUrl} …`;
      chartEl.style.display = "none";

      try {
        const res = await fetch(csvUrl);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const rows = parseCSV(await res.text());
        if (!rows.length) throw new Error("CSV 为空");
        cachedRows = rows;
        renderChart(rowsToChartData(rows));
      } catch (err) {
        status.className = "error";
        status.textContent = `加载失败: ${err.message}。请先运行 python Yan_coin.py 生成数据。`;
      }
    }

    document.getElementById("source").addEventListener("change", loadChart);
    document.getElementById("method").addEventListener("change", loadChart);
    window.addEventListener("resize", () => {
      const mobile = isMobile();
      if (chart) chart.resize();
      if (cachedRows && mobile !== lastMobile) {
        renderChart(rowsToChartData(cachedRows));
      }
    });

    loadChart();
  </script>
</body>
</html>
